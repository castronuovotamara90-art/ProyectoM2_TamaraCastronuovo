openapi: 3.0.3
info:
  title: Blog API
  version: 1.0.0
  description: Documentacion base de la API de autores y posts.
servers:
  - url: https://fsm2miniblog-production.up.railway.app
  - url: http://localhost:3000
tags:
  - name: Health
  - name: Authors
  - name: Posts
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
paths:
  /:
    get:
      tags: [Health]
      summary: Estado general de la API
      responses:
        '200':
          description: API activa

  /api/authors:
    get:
      tags: [Authors]
      summary: Listar autores
      responses:
        '200':
          description: Lista de autores
        '500':
          description: Error interno del servidor
    post:
      tags: [Authors]
      summary: Crear autor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                bio:
                  type: string
      responses:
        '201':
          description: Autor creado
        '400':
          description: Error de validacion
        '500':
          description: Error interno del servidor

  /api/authors/{id}:
    get:
      tags: [Authors]
      summary: Obtener autor por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Autor encontrado
        '400':
          description: Error de validacion
        '404':
          description: Autor no encontrado
        '500':
          description: Error interno del servidor
    put:
      tags: [Authors]
      summary: Actualizar autor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                bio:
                  type: string
      responses:
        '200':
          description: Autor actualizado
        '400':
          description: Error de validacion
        '404':
          description: Autor no encontrado
        '500':
          description: Error interno del servidor
    delete:
      tags: [Authors]
      summary: Eliminar autor
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Autor eliminado
        '400':
          description: Error de validacion
        '404':
          description: Autor no encontrado
        '500':
          description: Error interno del servidor

  /api/posts:
    get:
      tags: [Posts]
      summary: Listar posts
      parameters:
        - in: query
          name: published
          required: false
          schema:
            type: string
            enum: ['true', 'false']
      responses:
        '200':
          description: Lista de posts
        '400':
          description: Query invalida
        '500':
          description: Error interno del servidor
    post:
      tags: [Posts]
      summary: Crear post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content, author_id]
              properties:
                title:
                  type: string
                content:
                  type: string
                author_id:
                  type: integer
                published:
                  type: boolean
      responses:
        '201':
          description: Post creado
        '400':
          description: Error de validacion
        '404':
          description: Autor no encontrado
        '500':
          description: Error interno del servidor

  /api/posts/{id}:
    get:
      tags: [Posts]
      summary: Obtener post por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Post encontrado
        '400':
          description: Error de validacion
        '404':
          description: Post no encontrado
        '500':
          description: Error interno del servidor
    put:
      tags: [Posts]
      summary: Actualizar post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                published:
                  type: boolean
      responses:
        '200':
          description: Post actualizado
        '400':
          description: Error de validacion
        '404':
          description: Post no encontrado
        '500':
          description: Error interno del servidor
    delete:
      tags: [Posts]
      summary: Eliminar post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Post eliminado
        '400':
          description: Error de validacion
        '404':
          description: Post no encontrado
        '500':
          description: Error interno del servidor

  /api/posts/author/{authorId}:
    get:
      tags: [Posts]
      summary: Listar posts por autor
      parameters:
        - in: path
          name: authorId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de posts del autor
        '400':
          description: Error de validacion
        '500':
          description: Error interno del servidor